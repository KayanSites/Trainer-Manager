<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Trainer Manager</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ================= THEME ================= */
[data-theme="light"]{
  --paper:#FBF7F9; --card:#FFFFFF; --sunk:#F2EDF1;
  --ink:#1C2445; --muted:#6E7593; --line:#E9E4EA; --line2:#D3CDD8;
  --brand:#D6437E; --brand-bg:#FCE7EF; --brand-ink:#B02F65;
  --makeup:#22305C; --makeup-bg:#E6E9F2;
  --ok:#2E8B72;   --ok-bg:#E3F2ED;
  --warn:#C08A2E; --warn-bg:#FAF0DE;
  --info:#5C6FA8; --info-bg:#E9ECF6;
  --bad:#C74B4B;  --bad-bg:#FAE6E6;
  --glass:rgba(251,247,249,.9);
}
[data-theme="dark"]{
  --paper:#0F1428; --card:#1A2038; --sunk:#242B48;
  --ink:#EDEFF7; --muted:#98A0BE; --line:#2C3350; --line2:#3C4568;
  --brand:#F06AA0; --brand-bg:#3A1F30; --brand-ink:#FF9AC0;
  --makeup:#8FA5E8; --makeup-bg:#1F2745;
  --ok:#4FBF9C;   --ok-bg:#123129;
  --warn:#DDA954; --warn-bg:#342913;
  --info:#8496D8; --info-bg:#1E2440;
  --bad:#E06A6A;  --bad-bg:#3A1F1F;
  --glass:rgba(15,20,40,.9);
}
:root{ --r:16px; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--paper);
  color:var(--ink);font-size:16px;line-height:1.5;padding-bottom:96px;
  transition:background .2s,color .2s}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--brand);outline-offset:1px}
[hidden]{display:none!important}
html[dir=ltr] .flip{transform:scaleX(-1)}

/* ================= شريط علوي ================= */
header{position:sticky;top:0;z-index:30;background:var(--glass);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:11px 14px}
.hrow{display:flex;align-items:center;gap:9px}
.icnbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--card);display:grid;place-items:center;flex-shrink:0;color:var(--muted)}
.icnbtn svg{width:16px;height:16px;stroke-width:2.3}
.icnbtn.on{background:var(--brand);border-color:var(--brand);color:#fff}
.lang{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.htxt{flex:1;min-width:0}
.title{font-family:'Reem Kufi',sans-serif;font-size:16.5px;font-weight:600;letter-spacing:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub{font-size:12.5px;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.demo{background:var(--warn-bg);color:var(--warn);font-size:11.5px;font-weight:700;
  text-align:center;padding:5px;letter-spacing:.02em}

/* ================= أدوات مشتركة ================= */
.seg{display:flex;gap:3px;background:var(--sunk);padding:3px;border-radius:11px}
.seg button{flex:1;padding:9px;border-radius:8px;font-size:13.5px;font-weight:600;
  color:var(--muted);transition:all .12s}
.seg button[aria-pressed="true"]{background:var(--brand);color:#fff}
.seg button[aria-pressed="true"][data-k="makeup"]{background:var(--makeup)}

.pickers{display:flex;gap:8px;margin-top:10px}
.f{flex:1;min-width:0}
.f label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;padding:9px 10px;border:1px solid var(--line);
  border-radius:10px;background:var(--card);font-size:14px;font-weight:500}
.f textarea{resize:vertical;min-height:44px;font-weight:400}

main{padding:12px}
.sec{font-family:'Reem Kufi',sans-serif;font-size:12.5px;font-weight:600;color:var(--muted);margin:22px 4px 9px;letter-spacing:.01em}
.sec:first-child{margin-top:2px}
.msg{text-align:center;color:var(--muted);padding:30px 20px;font-size:13.5px;
  background:var(--card);border:1px dashed var(--line);border-radius:var(--r)}

.row{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;transition:border-color .15s,background .15s}
.row.tap{cursor:pointer}
.row.tap:active{border-color:var(--brand)}
.name{flex:1;min-width:0;font-weight:600;font-size:15px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.name small{display:block;font-weight:500;font-size:11.5px;color:var(--muted);margin-top:1px}
.chev{color:var(--line2);flex-shrink:0}
.chev svg{width:16px;height:16px;stroke-width:2.6}
.del{color:var(--line2);padding:6px;flex-shrink:0}
.del svg{width:16px;height:16px;stroke-width:2.2}
.idx{width:28px;height:28px;border-radius:8px;background:var(--brand-bg);color:var(--brand-ink);
  display:grid;place-items:center;font-size:12.5px;font-weight:700;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace}

/* حالة الصف */
.row[data-s="present"],.row[data-s="done"]{border-color:color-mix(in srgb,var(--ok) 40%,var(--line))}
.row[data-s="late"],.row[data-s="partial"]{border-color:color-mix(in srgb,var(--warn) 40%,var(--line))}
.row[data-s="excused"]{border-color:color-mix(in srgb,var(--info) 40%,var(--line))}
.row[data-s="absent"],.row[data-s="missing"]{border-color:color-mix(in srgb,var(--bad) 40%,var(--line))}

/* المفتاح الرباعي */
.states{display:flex;gap:3px;background:var(--sunk);padding:3px;border-radius:11px;flex-shrink:0}
.states button{width:41px;height:37px;border-radius:8px;display:grid;place-items:center;
  color:var(--muted);transition:all .12s}
.states button svg{width:18px;height:18px;stroke-width:2.4}
.states button[aria-pressed="true"][data-v="present"],
.states button[aria-pressed="true"][data-v="done"]{background:var(--ok);color:#fff}
.states button[aria-pressed="true"][data-v="late"],
.states button[aria-pressed="true"][data-v="partial"]{background:var(--warn);color:#fff}
.states button[aria-pressed="true"][data-v="excused"]{background:var(--info);color:#fff}
.states button[aria-pressed="true"][data-v="absent"],
.states button[aria-pressed="true"][data-v="missing"]{background:var(--bad);color:#fff}

.more{width:30px;height:37px;border-radius:8px;color:var(--muted);
  display:grid;place-items:center;flex-shrink:0}
.more svg{width:17px;height:17px}
.row[data-open="1"] .more{background:var(--sunk);color:var(--ink)}
.extra{flex:1 0 100%;display:none;gap:8px;margin-top:9px;padding-top:9px;
  border-top:1px dashed var(--line)}
.row[data-open="1"] .extra{display:flex}
.extra input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;
  background:var(--paper);font-size:13.5px}
.extra input[type=number]{flex:0 0 90px;text-align:center;
  font-family:'IBM Plex Mono',monospace}
.extra input[type=text]{flex:1;min-width:0}

/* العدّاد */
.tally{display:flex;gap:6px;margin-top:11px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;font-weight:600}
.tally span{flex:1;text-align:center;padding:6px 2px;border-radius:8px;
  font-variant-numeric:tabular-nums}
.tally .c0{background:var(--ok-bg);color:var(--ok)}
.tally .c1{background:var(--warn-bg);color:var(--warn)}
.tally .c2{background:var(--info-bg);color:var(--info)}
.tally .c3{background:var(--bad-bg);color:var(--bad)}

/* شريط سفلي */
.savebar{position:fixed;bottom:0;inset-inline:0;z-index:30;
  padding:11px 14px calc(11px + env(safe-area-inset-bottom));
  background:var(--glass);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;gap:9px}
.btn{flex:1;background:var(--brand);color:#fff;font-weight:700;font-size:15.5px;
  padding:14px;border-radius:12px}
.btn:disabled{opacity:.45}
.btn.mk{background:var(--makeup)}
.btn.ghost{flex:0 0 auto;padding:14px 15px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);font-size:14px;font-weight:600}

/* نموذج */
.form{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:12px;margin-bottom:8px}
.form .f{margin-bottom:9px}
.form input,.form select,.form textarea{background:var(--paper)}
.fbtn{width:100%;background:var(--brand);color:#fff;font-weight:700;font-size:14.5px;
  padding:11px;border-radius:11px;margin-top:2px}
.fbtn.alt{background:var(--card);color:var(--brand-ink);border:1px solid var(--brand)}
.two{display:flex;gap:8px}

/* مرفقات */
.att{display:flex;align-items:center;gap:9px;background:var(--card);
  border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:6px}
.att .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.att .ic.file{background:var(--brand-bg);color:var(--brand-ink)}
.att .ic.link{background:var(--makeup-bg);color:var(--makeup)}
.att .ic svg{width:14px;height:14px;stroke-width:2.3}
.att a{flex:1;min-width:0;font-size:13.5px;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att small{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* المساحة */
.disk{margin-top:11px}
.disk .bar{height:5px;background:var(--sunk);border-radius:99px;overflow:hidden}
.disk .fill{height:100%;background:var(--brand);border-radius:99px;transition:width .4s}
.disk .fill.hi{background:var(--warn)} .disk .fill.max{background:var(--bad)}
.disk .lbl{font-size:11px;color:var(--muted);margin-top:4px;
  font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}

/* الرئيسية */
.hi{font-family:'Reem Kufi',sans-serif;font-size:23px;font-weight:600;padding:20px 4px 0}
.today{font-size:13px;color:var(--muted);padding:0 4px 2px}
.quick{display:flex;gap:8px;margin:14px 0 2px}
.quick button{flex:1;background:var(--brand);color:#fff;padding:15px 10px;border-radius:16px;
  font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:7px}
.quick button.alt{background:var(--card);color:var(--brand-ink);border:1px solid var(--brand)}
.quick svg{width:17px;height:17px;stroke-width:2.3}
.dot{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0}
.dot.ok{background:var(--brand-bg);color:var(--brand-ink)}
.dot.warn{background:var(--warn-bg);color:var(--warn)}
.dot.bad{background:var(--bad-bg);color:var(--bad)}
.tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace}
.tag.att{background:var(--bad-bg);color:var(--bad)}
.tag.tsk{background:var(--warn-bg);color:var(--warn)}
.flag{border-color:color-mix(in srgb,var(--bad) 35%,var(--line))}

/* تقرير الطالب */
.hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px}
.hero h1{font-family:'Reem Kufi',sans-serif;font-size:22px;font-weight:600}
.hero .grp{font-size:12.5px;color:var(--muted);margin-top:1px}
.stats{display:flex;gap:6px;margin-top:14px}
.stat{flex:1;text-align:center;padding:10px 3px;border-radius:12px;
  background:var(--paper);border:1px solid var(--line)}
.stat b{display:block;font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.stat small{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.stat.big{background:var(--brand);border-color:var(--brand);color:#fff}
.stat.big small{color:rgba(255,255,255,.72)}
.stat.big.warn{background:var(--warn);border-color:var(--warn)}
.stat.big.bad{background:var(--bad);border-color:var(--bad)}

.tl{position:relative;padding-inline-start:21px}
.tl::before{content:'';position:absolute;inset-inline-start:5px;top:8px;bottom:8px;
  width:2px;background:var(--line)}
.ev{position:relative;margin-bottom:8px}
.ev::before{content:'';position:absolute;inset-inline-start:-20px;top:14px;
  width:10px;height:10px;border-radius:50%;border:2px solid var(--paper)}
.ev[data-k=present]::before{background:var(--ok)}
.ev[data-k=late]::before{background:var(--warn)}
.ev[data-k=excused]::before{background:var(--info)}
.ev[data-k=absent]::before{background:var(--bad)}
.ev[data-k=makeup]::before{background:var(--makeup)}
.line{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:9px 11px;display:flex;align-items:center;gap:9px}
.ev[data-k=absent] .line{border-color:color-mix(in srgb,var(--bad) 35%,var(--line))}
.ev[data-k=makeup] .line{border-color:color-mix(in srgb,var(--makeup) 35%,var(--line))}
.line .d{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  flex-shrink:0;width:50px}
.line .t{flex:1;min-width:0;font-size:13.5px;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0}
.b-present,.b-done{background:var(--ok-bg);color:var(--ok)}
.b-late,.b-partial{background:var(--warn-bg);color:var(--warn)}
.b-excused{background:var(--info-bg);color:var(--info)}
.b-absent,.b-missing{background:var(--bad-bg);color:var(--bad)}
.b-makeup{background:var(--makeup-bg);color:var(--makeup)}
.covered{font-size:11.5px;color:var(--makeup);font-weight:600;
  margin-top:3px;padding-inline-start:60px}
.score{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;flex-shrink:0}

.toast{position:fixed;bottom:86px;inset-inline:14px;z-index:40;background:var(--ink);
  color:var(--paper);padding:12px 16px;border-radius:11px;font-size:14px;font-weight:600;
  text-align:center;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--bad);color:#fff}
.banner{padding:9px;border-radius:10px;margin-bottom:10px;font-size:12.5px;
  font-weight:600;text-align:center}
.banner.c{background:var(--bad-bg);color:var(--bad)}
.banner.m{background:var(--makeup-bg);color:var(--makeup)}

/* ================= شاشة الدخول ================= */
#gate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;
  direction:ltr;text-align:left;
  background:radial-gradient(120% 100% at 50% 0%, #2A3566 0%, #141B36 55%, #0D1229 100%)}
#gate::before{content:'';position:absolute;top:-140px;left:50%;transform:translateX(-50%);
  width:420px;height:280px;border-radius:50%;filter:blur(90px);
  background:rgba(214,67,126,.42);pointer-events:none}
#gate .box{position:relative;width:100%;max-width:360px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:22px;padding:26px 22px;backdrop-filter:blur(16px);
  box-shadow:0 24px 60px -24px rgba(0,0,0,.6)}
#gate .mark{width:44px;height:44px;border-radius:13px;margin:0 auto 14px;
  display:grid;place-items:center;color:#fff;
  background:linear-gradient(140deg,#E8558D,#B02F65);
  box-shadow:0 8px 22px -8px rgba(214,67,126,.8)}
#gate .mark svg{width:22px;height:22px;stroke-width:2.3}
#gate h1{font-family:'Reem Kufi',sans-serif;font-size:23px;font-weight:600;
  color:#fff;text-align:center;letter-spacing:.01em}
#gate .tagline{text-align:center;color:#9AA6CC;font-size:13px;margin-top:2px;margin-bottom:20px}

#gate .tabs{display:flex;gap:3px;background:rgba(255,255,255,.07);padding:3px;
  border-radius:11px;margin-bottom:16px}
#gate .tabs button{flex:1;padding:9px;border-radius:8px;font-size:13.5px;font-weight:600;
  color:#9AA6CC;transition:all .15s}
#gate .tabs button[aria-pressed="true"]{background:#D6437E;color:#fff;
  box-shadow:0 4px 14px -6px rgba(214,67,126,.9)}

#gate .fld{margin-bottom:10px}
#gate label{display:block;font-size:11px;font-weight:600;color:#8E9AC0;
  margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
#gate input{width:100%;padding:12px 13px;border-radius:11px;font-size:15px;
  color:#fff;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.14);transition:border-color .15s}
#gate input::placeholder{color:#6B77A0}
#gate input:focus{outline:none;border-color:#E8558D;
  box-shadow:0 0 0 3px rgba(232,85,141,.18)}

#gate .go{width:100%;margin-top:14px;padding:14px;border-radius:12px;
  font-size:15.5px;font-weight:700;color:#fff;
  background:linear-gradient(140deg,#E8558D,#C93A72);
  box-shadow:0 10px 26px -10px rgba(214,67,126,.9);transition:transform .1s,opacity .15s}
#gate .go:active{transform:translateY(1px)}
#gate .go:disabled{opacity:.55;box-shadow:none}

#gate .note{min-height:20px;margin-top:12px;text-align:center;font-size:12.5px;font-weight:500}
#gate .note.err{color:#FF8FA8}
#gate .note.ok{color:#6FD6B0}
#gate .foot{margin-top:16px;text-align:center;font-size:11px;color:#5E699180;color:#5E6991}

@media print{
  header,.savebar,.noprint,.toast,#gate{display:none!important}
  body{padding:0;background:#fff;color:#000}
  .hero,.line,.row{border-color:#ccc}
  .ev,.row{page-break-inside:avoid}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="gate" hidden>
  <div class="box">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/>
      </svg>
    </div>
    <h1>Trainer Manager</h1>
    <div class="tagline" id="gTag">Sign in to open your data</div>

    <div class="tabs">
      <button id="tabIn"  aria-pressed="true">Sign in</button>
      <button id="tabUp"  aria-pressed="false">Create account</button>
    </div>

    <div class="fld">
      <label for="gEmail">Email</label>
      <input type="email" id="gEmail" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="fld">
      <label for="gPass">Password</label>
      <input type="password" id="gPass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="go" id="gBtn">Sign in</button>
    <div class="note" id="gErr"></div>
    <div class="foot">Each trainer sees only her own data.</div>
  </div>
</div>

<header>
  <div class="hrow">
    <button class="icnbtn" id="back" hidden aria-label="back">
      <svg class="flip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <div class="htxt">
      <div class="title" id="title">—</div>
      <div class="sub" id="sub"></div>
    </div>
    <button class="icnbtn lang" id="langBtn">EN</button>
    <button class="icnbtn" id="themeBtn" aria-label="theme"></button>
    <button class="icnbtn" id="outBtn" hidden aria-label="sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5M21 12H9"/></svg>
    </button>
  </div>
  <div id="hextra"></div>
</header>

<main id="view"><p class="msg" id="boot">جاري التحميل…</p></main>
<div class="savebar" id="bar" hidden></div>
<div class="toast" id="toast"></div>

<script type="module">
/* ============================================================
   1) CONFIG — عدّلي هنا بس
   ============================================================ */

const CDNS = [
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm',

function boot_err(title, detail){
  document.getElementById('gate').hidden = true;
  document.getElementById('title').textContent = title;
  document.getElementById('view').innerHTML =
    `<div class="msg" style="text-align:start;color:#C74B4B;border-color:#C74B4B;
       font-family:monospace;font-size:13px;line-height:1.8;direction:ltr">${detail}</div>`;
}

let createClient = null;
for (const url of CDNS){
  try{
    const mod = await Promise.race([
      import(url),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), 8000)),
    ]);
    if (mod?.createClient){ createClient = mod.createClient; break; }
  }catch(e){ console.warn('CDN failed:', url, e.message); }
}

if (!createClient){
  boot_err('النت مش راضي يحمّل المكتبة',
    'Could not load supabase-js from any CDN.<br><br>' +
    'جربي: نت تاني، أو VPN، أو افتحي الصفحة تاني.');
  throw new Error('supabase-js failed to load');
}

const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
const uid = () => (crypto.randomUUID?.() || 'id'+Math.random().toString(36).slice(2));

const DB = {
  async all(table){
    const {data,error} = await sb.from(table).select('*').is('deleted_at',null);
    if (error) throw error;
    return data;
  },
  async insert(table, row){
    const {data,error} = await sb.from(table).insert(row).select().single();
    if (error) throw error;
    return data;
  },
  async update(table, id, patch){
    const {error} = await sb.from(table).update(patch).eq('id',id);
    if (error) throw error;
  },
  async softDelete(table, id){
    const {error} = await sb.from(table)
      .update({deleted_at:new Date().toISOString()}).eq('id',id);
    if (error) throw error;
  },
  async upsertMany(table, rows, keys){
    const {error} = await sb.from(table).upsert(rows, {onConflict:keys.join(',')});
    if (error) throw error;
  },
  async deleteWhere(table, match){
    let q = sb.from(table).delete();
    Object.entries(match).forEach(([k,v])=>{ q = q.eq(k,v); });
    const {error} = await q;
    if (error) throw error;
  },
};

/* -------- الرفع: دالة واحدة. Cloudflare بعدين = تغيير هنا بس -------- */
async function compress(file){
  if (!file.type.startsWith('image/')) return file;
  const img = await createImageBitmap(file);
  const k = Math.min(1, CONFIG.MAX_IMG / Math.max(img.width, img.height));
  if (k===1 && file.size < 400_000) return file;
  const c = document.createElement('canvas');
  c.width = Math.round(img.width*k); c.height = Math.round(img.height*k);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  const blob = await new Promise(r=>c.toBlob(r,'image/webp',0.82));
  if (!blob || blob.size >= file.size) return file;
  return new File([blob], file.name.replace(/\.\w+$/,'')+'.webp', {type:'image/webp'});
}

async function uploadFile(file){
  const f = await compress(file);
  const ext  = (f.name.split('.').pop()||'bin').toLowerCase();
  const path = `${uid()}.${ext}`;                 // اسم آمن — العربي بيكسر اللينك
  const {error} = await sb.storage.from(CONFIG.BUCKET)
    .upload(path, f, {contentType:f.type, upsert:false});
  if (error) throw error;
  const {data} = sb.storage.from(CONFIG.BUCKET).getPublicUrl(path);
  return {url:data.publicUrl, filename:file.name, mime:f.type, size_bytes:f.size};
}

const M = {};   // كاش الجداول

// كل جدول بيتحمّل لوحده. لو واحد وقع، الباقي بيكمل والخطأ بيتسجّل.
async function loadAll(){
  const fails = [];
  await Promise.all(TABLES.map(async name => {
    try { M[name] = await DB.all(name); }
    catch (e){ M[name] = []; fails.push(`${name}: ${e.message||e}`); }
  }));
  return fails;
}

const byId  = (arr,id) => arr.find(x=>x.id===id);
const lecOf = id => byId(M.lectures,id)?.title || t('review');

// السيشنز اللي بتتحسب على طالب: عادية + حصلت + جوه نافذته
function eligibleSessions(studentId, groupId){
  const e = M.enrollments.find(x=>x.student_id===studentId && x.group_id===groupId);
  if (!e) return [];
  return M.sessions.filter(s =>
    s.group_id===groupId && s.kind==='regular' && s.status==='held' &&
    s.date >= e.joined_at && (!e.left_at || s.date <= e.left_at));
}

const attOf = (sid,stu) =>
  M.attendance.find(a=>a.session_id===sid && a.student_id===stu);

// مجموعة الغيابات اللي اتعوّضت
const coveredSet = stu => new Set(
  M.attendance.filter(a =>
    a.student_id===stu && a.makeup_for_session_id &&
    byId(M.sessions,a.session_id)?.kind==='makeup')
    .map(a=>a.makeup_for_session_id));

function attStats(studentId, groupId){
  const el = eligibleSessions(studentId, groupId);
  const c = {present:0, late:0, excused:0, absent:0};
  el.forEach(s=>{ const a=attOf(s.id,studentId); if (a) c[a.status]++; });
  const denom = el.length - c.excused;
  const pct = denom>0 ? Math.round((c.present+c.late)/denom*1000)/10 : null;
  const cov = coveredSet(studentId);
  const absCovered = el.filter(s =>
    attOf(s.id,studentId)?.status==='absent' && cov.has(s.id)).length;
  return {eligible:el.length, ...c, pct,
          absCovered, absUncovered: c.absent - absCovered};
}

// التاسكات اللي بتتحسب: تاسك محاضرة اتاخدت والطالب كان ملتحق
function eligibleTasks(studentId, groupId){
  const lecIds = new Set(eligibleSessions(studentId,groupId)
    .map(s=>s.lecture_id).filter(Boolean));
  return M.tasks.filter(x=>lecIds.has(x.lecture_id));
}
const subOf = (tid,stu) =>
  M.submissions.find(s=>s.task_id===tid && s.student_id===stu);

function taskStats(studentId, groupId){
  const el = eligibleTasks(studentId, groupId);
  const c = {done:0, partial:0, late:0, missing:0};
  const scores = [];
  el.forEach(x=>{
    const s = subOf(x.id, studentId);
    c[s?.status || 'missing']++;
    if (s?.score != null) scores.push(Number(s.score));
  });
  return {eligible:el.length, ...c,
    avg: scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10 : null};
}

// طلاب جروب في تاريخ معيّن
function studentsOn(groupId, date){
  return M.enrollments
    .filter(e=>e.group_id===groupId && e.joined_at<=date && (!e.left_at||e.left_at>=date))
    .map(e=>byId(M.students,e.student_id)).filter(Boolean)
    .sort((a,b)=>a.name.localeCompare(b.name,'ar'));
}

// المحاضرات اللي اتاخدت في جروب → أول تاريخ
function deliveredLectures(groupId){
  const d = {};
  M.sessions.filter(s=>s.group_id===groupId && s.kind==='regular'
                    && s.status==='held' && s.lecture_id)
    .forEach(s=>{ if (!d[s.lecture_id] || s.date < d[s.lecture_id]) d[s.lecture_id]=s.date; });
  return d;
}

function needsFollowup(){
  const out = [];
  M.groups.filter(g=>g.status==='active').forEach(g=>{
    M.enrollments.filter(e=>e.group_id===g.id && !e.left_at).forEach(e=>{
      const a = attStats(e.student_id, g.id);
      const k = taskStats(e.student_id, g.id);
      if ((a.pct!=null && a.pct<75) || k.missing>=2)
        out.push({student_id:e.student_id, name:byId(M.students,e.student_id)?.name,
                  group:g.title, pct:a.pct, missing:k.missing});
    });
  });
  return out.sort((a,b)=>(a.pct??100)-(b.pct??100));
}

function diskUsed(){
  return M.attachments.filter(a=>a.kind==='file')
    .reduce((s,a)=>s+(a.size_bytes||0),0);
}

/* ---------- الثيم واللغة ---------- */
function applyChrome(){
  document.documentElement.setAttribute('data-theme', THEME);
  document.documentElement.lang = LANG;
  document.documentElement.dir  = LANG==='ar' ? 'rtl' : 'ltr';
  $('themeBtn').innerHTML = THEME==='light' ? I.moon : I.sun;
  $('langBtn').textContent = LANG==='ar' ? 'EN' : 'ع';
}
$('themeBtn').addEventListener('click', ()=>{
  THEME = THEME==='light' ? 'dark' : 'light'; applyChrome();
});
$('langBtn').addEventListener('click', ()=>{
  LANG = LANG==='ar' ? 'en' : 'ar'; applyChrome(); render();
});

/* ---------- الراوتر ---------- */
let route = {p:'home'};
const stack = [];
function go(p, params={}){ stack.push(route); route={p,...params}; render(); }
function back(){ route = stack.pop() || {p:'home'}; render(); }
$('back').addEventListener('click', back);

/* ---------- نموذج عام ---------- */
const forms = {};
function formHTML(id, title, fields){
  forms[id] = fields;
  const rows = fields.map(f=>`
    <div class="f" ${f.w?`style="flex:0 0 ${f.w}"`:''}>
      <label>${f.l}</label>
      ${f.type==='select'
        ? `<select data-k="${f.k}"><option value="">${t('pick')}</option>${
            f.opts.map(o=>`<option value="${o.v}">${esc(o.n)}</option>`).join('')}</select>`
        : f.type==='textarea'
        ? `<textarea data-k="${f.k}" placeholder="${f.ph||''}"></textarea>`
        : `<input type="${f.type||'text'}" data-k="${f.k}"
             placeholder="${f.ph||''}" value="${f.val??''}">`}
    </div>`);
  // نجمّع الحقول اللي عليها علامة pair في صف واحد
  let html = `<div class="form" data-form="${id}">
    <div class="sec" style="margin:0 0 9px">${title}</div>`;
  for (let i=0;i<fields.length;i++){
    if (fields[i].pair && fields[i+1]){
      html += `<div class="two">${rows[i]}${rows[i+1]}</div>`; i++;
    } else html += rows[i];
  }
  return html + `<button class="fbtn" data-do="${id}">${t('save')}</button></div>`;
}
function readForm(id){
  const box = document.querySelector(`[data-form="${id}"]`);
  const v = {};
  box.querySelectorAll('[data-k]').forEach(el=>v[el.dataset.k]=el.value.trim());
  return v;
}

/* ---------- الحضور ---------- */
function Attendance(){
  ui.kind ??= 'regular';
  ui.gid  ??= M.groups.find(g=>g.status==='active')?.id;
  ui.date ??= today();
  const gs = M.groups.filter(g=>g.status==='active');
  if (!gs.length){ head(t('attendance')); $('view').innerHTML=`<p class="msg">${t('noGroups')}</p>`; return; }
  if (!gs.some(g=>g.id===ui.gid)) ui.gid = gs[0].id;

  const g   = byId(M.groups, ui.gid);
  const mk  = ui.kind==='makeup';
  const ses = M.sessions.find(s=>s.group_id===ui.gid && s.date===ui.date && s.kind===ui.kind);
  const cancelled = ses?.status==='cancelled';
  const studs = studentsOn(ui.gid, ui.date);

  // اقتراح المحاضرة
  const taken = M.sessions.filter(s=>s.group_id===ui.gid && s.kind==='regular'
      && s.status==='held' && s.lecture_id && s.date < ui.date).map(s=>s.lecture_id);
  const lecs = M.lectures.filter(l=>l.course_id===g.course_id)
    .sort((a,b)=>a.order_index-b.order_index);
  const sug = ses?.lecture_id ?? (lecs.find(l=>!taken.includes(l.id))?.id ?? '');

  // نعيد تحميل الحالة بس لو اتغيّر الجروب/التاريخ/النوع
  const ctx = `${ui.gid}|${ui.date}|${ui.kind}`;
  if (ui.ctx !== ctx){
    ui.ctx = ctx;
    ui.marks = {}; ui.inMk = {}; ui.mkFor = {};
    const cur = ses ? M.attendance.filter(a=>a.session_id===ses.id) : [];
    if (!mk){
      studs.forEach(s=>ui.marks[s.id]='present');           // الافتراضي: حاضر
      cur.forEach(a=>ui.marks[a.student_id]=a.status);
    } else {
      studs.forEach(s=>{ ui.inMk[s.id]=false; ui.mkFor[s.id]=''; });
      cur.forEach(a=>{ ui.inMk[a.student_id]=true;          // الافتراضي: مش حاضر
                       ui.mkFor[a.student_id]=a.makeup_for_session_id||''; });
    }
    ui.lec  = sug;
    ui.note = ses?.makeup_note || '';
  }
  ui.ses = ses;

  head(t('attendance'), mk
    ? t('attended', Object.values(ui.inMk).filter(Boolean).length, studs.length)
    : `${t('nStud',studs.length)} · ${ses?t('editSes'):t('newSes')}`);

  $('hextra').innerHTML = `
    <div class="seg" style="margin-top:11px">
      <button data-kind="regular" aria-pressed="${!mk}">${t('regular')}</button>
      <button data-kind="makeup" data-k="makeup" aria-pressed="${mk}">${t('makeup')}</button>
    </div>
    <div class="pickers">
      <div class="f"><label>${t('group')}</label><select id="gsel">
        ${gs.map(x=>`<option value="${x.id}" ${x.id===ui.gid?'selected':''}>${esc(x.title)}</option>`).join('')}
      </select></div>
      <div class="f" style="flex:0 0 120px"><label>${t('date')}</label>
        <input type="date" id="dsel" value="${ui.date}"></div>
    </div>
    ${mk ? `<div class="pickers"><div class="f"><label>${t('gotWhat')}</label>
        <textarea id="nsel" placeholder="${t('gotWhatPh')}">${esc(ui.note)}</textarea></div></div>`
         : `<div class="pickers"><div class="f"><label>${t('lecture')}</label><select id="lsel">
        <option value="">${t('none')}</option>
        ${lecs.map(l=>`<option value="${l.id}" ${l.id===sug?'selected':''}>${l.order_index}. ${esc(l.title)}</option>`).join('')}
      </select></div></div>`}
    ${!mk ? `<div class="tally" id="tally"></div>` : ''}`;

  $('view').innerHTML =
    (cancelled ? `<div class="banner c">${t('cancelled')}</div>` : '') +
    (mk ? `<div class="banner m">${t('mkNote')}</div>` : '') +
    (!studs.length ? `<p class="msg">${t('noStudHere')}</p>`
     : `<div ${cancelled?'style="opacity:.45;pointer-events:none"':''}>` +
       studs.map(s=>mk ? mkRow(s) : attRow(s)).join('') + '</div>');

  $('bar').hidden = false;
  $('bar').innerHTML =
    `<button class="btn ${mk?'mk':''}" id="save" ${cancelled?'disabled':''}>${t('save')}</button>` +
    (!mk ? `<button class="btn ghost" id="cxl">${cancelled?t('uncancelSes'):t('cancelSes')}</button>` : '');

  if (!mk) tally();
  wireAttendance();
}

function attRow(s){
  return `<div class="row" data-s="${ui.marks[s.id]}" data-id="${s.id}">
    <span class="name">${esc(s.name)}</span>
    <div class="states">${A_STATES.map(v=>
      `<button data-v="${v}" aria-label="${t(v)}" aria-pressed="${ui.marks[s.id]===v}">${I[v]}</button>`).join('')}</div>
  </div>`;
}

function mkRow(s){
  const cov = coveredSet(s.id);
  const open = eligibleSessions(s.id, ui.gid)
    .filter(x=>attOf(x.id,s.id)?.status==='absent')
    .filter(x=>!cov.has(x.id) || x.id===ui.mkFor[s.id])
    .sort((a,b)=>b.date.localeCompare(a.date));
  return `<div class="row" data-mk="1" data-id="${s.id}" data-in="${ui.inMk[s.id]?1:0}"
      style="${ui.inMk[s.id]?'border-color:var(--makeup)':''}">
    <button class="states" style="padding:0;background:none" data-chk>
      <span style="width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
        border:2px solid ${ui.inMk[s.id]?'var(--makeup)':'var(--line2)'};
        background:${ui.inMk[s.id]?'var(--makeup)':'transparent'};
        color:${ui.inMk[s.id]?'#fff':'transparent'}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
          stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
      </span>
    </button>
    <span class="name">${esc(s.name)}
      ${open.length?`<small>${t('openAbs',open.length)}</small>`:''}</span>
    ${ui.inMk[s.id] ? `<div style="flex:1 0 100%;margin-top:8px">
      <select data-for="${s.id}" style="width:100%;padding:8px 10px;border:1px solid var(--line);
        border-radius:9px;background:var(--card);font-size:13px">
        <option value="">${t('notLinked')}</option>
        ${open.map(x=>`<option value="${x.id}" ${ui.mkFor[s.id]===x.id?'selected':''}>
          ${t('insteadOf', fmtD(x.date), esc(lecOf(x.lecture_id)))}</option>`).join('')}
      </select></div>` : ''}
  </div>`;
}

function tally(){
  const c = {present:0,late:0,excused:0,absent:0};
  Object.values(ui.marks).forEach(v=>c[v]++);
  const el = $('tally'); if (!el) return;
  el.innerHTML = A_STATES.map((v,i)=>
    `<span class="c${i}">${t(v)} <b>${c[v]}</b></span>`).join('');
}

function wireAttendance(){
  $('gsel').onchange = e => { ui.gid=e.target.value; render(); };
  $('dsel').onchange = e => { ui.date=e.target.value; render(); };
  if ($('lsel')) $('lsel').onchange = e => ui.lec = e.target.value;
  if ($('nsel')) $('nsel').oninput  = e => ui.note = e.target.value;

  document.querySelectorAll('[data-kind]').forEach(b=>
    b.onclick = ()=>{ ui.kind=b.dataset.kind; render(); });

  $('view').onclick = e => {
    const st = e.target.closest('.states button[data-v]');
    if (st){
      const row = st.closest('.row');
      ui.marks[row.dataset.id] = st.dataset.v;
      row.dataset.s = st.dataset.v;
      row.querySelectorAll('[data-v]').forEach(b=>b.setAttribute('aria-pressed', b===st));
      navigator.vibrate?.(8); tally();
      return;
    }
    const chk = e.target.closest('[data-chk]');
    if (chk){
      const id = chk.closest('.row').dataset.id;
      ui.inMk[id] = !ui.inMk[id];
      if (!ui.inMk[id]) ui.mkFor[id]='';
      navigator.vibrate?.(8);
      Attendance();          // ctx مش اتغيّر → الحالة بتفضل زي ما هي
    }
  };
  $('view').onchange = e => {
    const sel = e.target.closest('select[data-for]');
    if (sel) ui.mkFor[sel.dataset.for] = sel.value;
  };
  $('save').onclick = saveAttendance;
  if ($('cxl')) $('cxl').onclick = toggleCancel;
}

async function saveAttendance(){
  const b = $('save'); b.disabled = true; b.textContent = t('saving');
  try{
    const mk = ui.kind==='makeup';
    let ses = ui.ses;
    const patch = mk ? {lecture_id:null, makeup_note:ui.note||null}
                     : {lecture_id:ui.lec||null};
    if (ses) await DB.update('sessions', ses.id, patch);
    else ses = await DB.insert('sessions', {
      group_id:ui.gid, date:ui.date, kind:ui.kind, status:'held', ...patch});

    const studs = studentsOn(ui.gid, ui.date);
    if (mk){
      const inn = studs.filter(s=>ui.inMk[s.id]);
      await DB.deleteWhere('attendance', {session_id:ses.id});
      if (inn.length) await DB.upsertMany('attendance', inn.map(s=>({
        session_id:ses.id, student_id:s.id, status:'present',
        makeup_for_session_id: ui.mkFor[s.id] || null,
      })), ['session_id','student_id']);
    } else {
      await DB.upsertMany('attendance', studs.map(s=>({
        session_id:ses.id, student_id:s.id, status:ui.marks[s.id],
      })), ['session_id','student_id']);
    }
    await loadAll();
    ui.ctx = null;                  // نعيد التحميل من المصدر
    toast(t('saved')); render();
  }catch(err){ console.error(err); toast(t('saveFail'), true); }
  finally{ b.disabled=false; b.textContent=t('save'); }
}

async function toggleCancel(){
  let ses = ui.ses;
  const isC = ses?.status==='cancelled';
  if (!isC && !confirm(t('confirmCancel'))) return;
  try{
    if (!ses) await DB.insert('sessions', {group_id:ui.gid, date:ui.date,
      kind:'regular', status:'cancelled', lecture_id:null});
    else await DB.update('sessions', ses.id, {status: isC?'held':'cancelled'});
    await loadAll(); ui.ctx = null;
    toast(t('saved')); render();
  }catch(err){ console.error(err); toast(t('err'), true); }
}

/* ---------- تصحيح التاسكات ---------- */
function Grading(){
  const gs = M.groups.filter(g=>g.status==='active');
  if (!gs.length){ head(t('grading')); $('view').innerHTML=`<p class="msg">${t('noGroups')}</p>`; return; }
  ui.gid2 ??= gs[0].id;
  if (!gs.some(g=>g.id===ui.gid2)) ui.gid2 = gs[0].id;

  const delivered = deliveredLectures(ui.gid2);
  const tasks = M.tasks
    .filter(x=>delivered[x.lecture_id])
    .map(x=>({...x, on:delivered[x.lecture_id], lec:byId(M.lectures,x.lecture_id)}))
    .sort((a,b)=>(a.lec?.order_index||0)-(b.lec?.order_index||0));

  const gsel = `<div class="pickers"><div class="f"><label>${t('group')}</label>
    <select id="gsel2">${gs.map(x=>
      `<option value="${x.id}" ${x.id===ui.gid2?'selected':''}>${esc(x.title)}</option>`).join('')}
    </select></div></div>`;

  if (!Object.keys(delivered).length || !tasks.length){
    head(t('grading'));
    $('hextra').innerHTML = gsel;
    $('view').innerHTML = `<p class="msg">${
      Object.keys(delivered).length ? t('noTasksYet') : t('noLec')}</p>`;
    $('gsel2').onchange = e=>{ ui.gid2=e.target.value; ui.tid=null; render(); };
    return;
  }

  if (!tasks.some(x=>x.id===ui.tid)) { ui.tid = tasks[0].id; ui.subs = null; }
  const task = tasks.find(x=>x.id===ui.tid);
  const studs = M.enrollments
    .filter(e=>e.group_id===ui.gid2 && e.joined_at<=task.on && (!e.left_at||e.left_at>=task.on))
    .map(e=>byId(M.students,e.student_id)).filter(Boolean)
    .sort((a,b)=>a.name.localeCompare(b.name,'ar'));

  if (!ui.subs || ui.subCtx !== ui.tid){
    ui.subCtx = ui.tid; ui.subs = {}; ui.open = {};
    studs.forEach(s=>{
      const x = subOf(task.id, s.id);
      ui.subs[s.id] = {status:x?.status||'missing', score:x?.score??null, feedback:x?.feedback||''};
    });
  }

  const graded = studs.filter(s=>ui.subs[s.id].status!=='missing').length;
  head(t('grading'), `${t('nStud',studs.length)} · ${esc(task.lec?.title||'')}`);

  $('hextra').innerHTML = gsel + `
    <div class="pickers"><div class="f"><label>${t('task')}</label>
      <select id="tsel">${tasks.map(x=>
        `<option value="${x.id}" ${x.id===ui.tid?'selected':''}>${x.lec?.order_index}. ${esc(x.title)}</option>`).join('')}
      </select></div></div>
    <div class="tally" id="tally2"></div>`;

  $('view').innerHTML = studs.length ? studs.map(s=>{
    const v = ui.subs[s.id];
    const line = [v.score!=null ? v.score + (task.max_score?'/'+task.max_score:'') : '',
                  v.feedback].filter(Boolean).join(' · ');
    return `<div class="row" data-s="${v.status}" data-id="${s.id}" data-open="${ui.open[s.id]?1:0}">
      <span class="name">${esc(s.name)}${line?`<small>${esc(line)}</small>`:''}</span>
      <div class="states">${T_STATES.map(x=>
        `<button data-v="${x}" aria-label="${T_LBL(x)}" aria-pressed="${v.status===x}">${
          I[x==='done'?'present':x==='partial'?'partial':x==='late'?'late':'absent']}</button>`).join('')}</div>
      <button class="more">${I.more}</button>
      <div class="extra">
        ${task.max_score?`<input type="number" data-k="score" min="0" max="${task.max_score}"
           step="0.5" placeholder="${t('score')}" value="${v.score??''}">`:''}
        <input type="text" data-k="feedback" placeholder="${t('note')}" value="${esc(v.feedback)}">
      </div>
    </div>`;
  }).join('') : `<p class="msg">${t('noStudTask')}</p>`;

  const meta = [];
  if (task.due_date) meta.push(t('dueOn', fmtD(task.due_date)));
  if (task.max_score) meta.push(t('outOf', task.max_score));
  meta.push(t('graded', graded, studs.length));
  $('sub').textContent = meta.join(' · ');

  gTally(studs);
  $('bar').hidden = false;
  $('bar').innerHTML = `<button class="btn" id="save2">${t('save')}</button>
    <button class="btn ghost" id="alldone">${t('allDone')}</button>`;

  $('gsel2').onchange = e=>{ ui.gid2=e.target.value; ui.tid=null; ui.subs=null; render(); };
  $('tsel').onchange  = e=>{ ui.tid=e.target.value; ui.subs=null; render(); };

  $('view').onclick = e=>{
    const st = e.target.closest('.states button[data-v]');
    if (st){
      const row = st.closest('.row');
      ui.subs[row.dataset.id].status = st.dataset.v;
      row.dataset.s = st.dataset.v;
      row.querySelectorAll('[data-v]').forEach(b=>b.setAttribute('aria-pressed', b===st));
      navigator.vibrate?.(8); gTally(studs);
      return;
    }
    const m = e.target.closest('.more');
    if (m){ const row=m.closest('.row'); const id=row.dataset.id;
      ui.open[id]=!ui.open[id]; row.dataset.open=ui.open[id]?1:0; }
  };
  $('view').oninput = e=>{
    const el = e.target.closest('[data-k]');
    if (!el) return;
    const id = el.closest('.row').dataset.id;
    if (el.dataset.k==='score') ui.subs[id].score = el.value===''?null:Number(el.value);
    else ui.subs[id].feedback = el.value;
  };
  $('alldone').onclick = ()=>{ studs.forEach(s=>ui.subs[s.id].status='done');
    render(); toast(t('allDone')); };
  $('save2').onclick = async ()=>{
    const b=$('save2'); b.disabled=true; b.textContent=t('saving');
    try{
      await DB.upsertMany('submissions', studs.map(s=>({
        task_id:task.id, student_id:s.id, group_id:ui.gid2,
        status:ui.subs[s.id].status,
        score:ui.subs[s.id].score,
        feedback:ui.subs[s.id].feedback || null,
        submitted_at: ui.subs[s.id].status==='missing' ? null : today(),
      })), ['task_id','student_id']);
      await loadAll(); ui.subs=null;
      toast(t('saved')); render();
    }catch(err){ console.error(err); toast(t('saveFail'),true); }
    finally{ b.disabled=false; b.textContent=t('save'); }
  };
}

function gTally(studs){
  const c={done:0,partial:0,late:0,missing:0};
  studs.forEach(s=>c[ui.subs[s.id].status]++);
  const el=$('tally2'); if(!el) return;
  el.innerHTML = T_STATES.map((v,i)=>
    `<span class="c${i}">${T_LBL(v)} <b>${c[v]}</b></span>`).join('');
}

function Student(){
  if (!M.students.length){ head(t('report')); $('view').innerHTML=`<p class="msg">${t('noStuds')}</p>`; return; }
  ui.sid = route.id || ui.sid || M.students[0].id;
  const s = byId(M.students, ui.sid) || M.students[0];

  const enr = M.enrollments.filter(e=>e.student_id===s.id);
  const gids = enr.map(e=>e.group_id);
  const A = gids.reduce((acc,g)=>{ const x=attStats(s.id,g);
    ['eligible','present','late','excused','absent','absCovered','absUncovered']
      .forEach(k=>acc[k]=(acc[k]||0)+x[k]);
    if (x.pct!=null) acc._p.push(x.pct); return acc; }, {_p:[]});
  const pct = A._p.length ? Math.round(A._p.reduce((a,b)=>a+b,0)/A._p.length*10)/10 : null;
  const K = gids.reduce((acc,g)=>{ const x=taskStats(s.id,g);
    ['done','partial','late','missing'].forEach(k=>acc[k]=(acc[k]||0)+x[k]);
    if (x.avg!=null) acc._a.push(x.avg); return acc; }, {_a:[]});
  const avg = K._a.length ? Math.round(K._a.reduce((a,b)=>a+b,0)/K._a.length*10)/10 : null;
  const cls = pct==null?'' : pct>=85?'' : pct>=70?'warn':'bad';

  const cov = coveredSet(s.id);
  const rows = M.attendance.filter(a=>a.student_id===s.id)
    .map(a=>({a, ses:byId(M.sessions, a.session_id)}))
    .filter(r=>r.ses && r.ses.status==='held')
    .map(r=>({
      sid:r.ses.id, date:r.ses.date, mk:r.ses.kind==='makeup',
      k: r.ses.kind==='makeup' ? 'makeup' : r.a.status,
      title: r.ses.kind==='makeup'
        ? (r.ses.makeup_note || t('makeup'))
        : lecOf(r.ses.lecture_id),
    }))
    .sort((a,b)=>b.date.localeCompare(a.date));

  const subs = M.submissions.filter(x=>x.student_id===s.id)
    .map(x=>({...x, tk:byId(M.tasks, x.task_id)}))
    .filter(x=>x.tk)
    .sort((a,b)=>(byId(M.lectures,a.tk.lecture_id)?.order_index||0)
                -(byId(M.lectures,b.tk.lecture_id)?.order_index||0));

  head(t('report'));
  $('hextra').innerHTML = `<div class="pickers">
    <div class="f"><select id="ssel">${M.students.map(x=>
      `<option value="${x.id}" ${x.id===s.id?'selected':''}>${esc(x.name)}</option>`).join('')}
    </select></div>
    <button class="icnbtn" id="pdfBtn" style="width:auto;padding:0 14px;font-weight:700;
      color:var(--brand-ink);border-color:var(--brand)">${t('pdf')}</button>
  </div>`;
  $('ssel').onchange = e=>{ ui.sid=e.target.value; route.id=e.target.value; render(); };
  $('pdfBtn').onclick = ()=>window.print();

  $('view').innerHTML = `
    <div class="hero">
      <h1>${esc(s.name)}</h1>
      <div class="grp">${enr.map(e=>esc(byId(M.groups,e.group_id)?.title)).join(' · ')
        || t('noGroupYet')}${s.parent_phone?` — ${t('parent', esc(s.parent_phone))}`:''}</div>
      <div class="stats">
        <div class="stat big ${cls}"><b>${pct??'—'}${pct!=null?'%':''}</b><small>${t('attendancePct')}</small></div>
        <div class="stat"><b>${A.absUncovered||0}</b><small>${t('absences')}</small></div>
        <div class="stat"><b>${A.absCovered||0}</b><small>${t('covered')}</small></div>
        <div class="stat"><b>${A.late||0}</b><small>${t('lates')}</small></div>
      </div>
      <div class="stats">
        <div class="stat"><b>${K.done||0}</b><small>${t('didTask')}</small></div>
        <div class="stat"><b>${K.missing||0}</b><small>${t('missTask')}</small></div>
        <div class="stat"><b>${avg??'—'}</b><small>${t('avg')}</small></div>
      </div>
    </div>

    <div class="sec">${t('attRecord')}</div>
    ${rows.length ? `<div class="tl">${rows.map(r=>`
      <div class="ev" data-k="${r.k}">
        <div class="line">
          <span class="d">${fmtD(r.date)}</span>
          <span class="t">${esc(r.title)}</span>
          <span class="badge b-${r.k}">${r.mk?t('extra'):t(r.k)}</span>
        </div>
        ${r.k==='absent' && cov.has(r.sid) ? `<div class="covered">${t('wasCovered')}</div>`:''}
      </div>`).join('')}</div>` : `<p class="msg">${t('noSessions')}</p>`}

    <div class="sec">${t('tasksT')}</div>
    ${subs.length ? subs.map(x=>`
      <div class="row">
        <span class="name">${esc(x.tk.title)}${x.feedback?`<small>${esc(x.feedback)}</small>`:''}</span>
        ${x.score!=null?`<span class="score">${x.score}${x.tk.max_score?'/'+x.tk.max_score:''}</span>`:''}
        <span class="badge b-${x.status}">${T_LBL(x.status)}</span>
      </div>`).join('') : `<p class="msg">${t('noTasksStud')}</p>`}`;
}

document.addEventListener('click', async e=>{
  // تنقل
  const g = e.target.closest('[data-go]');
  if (g){ ui = {...ui}; return go(g.dataset.go, {id:g.dataset.id}); }
  const g2 = e.target.closest('[data-go2]');
  if (g2){ return go(g2.dataset.go2, {id:g2.dataset.id}); }

  // نماذج
  const d = e.target.closest('[data-do]');
  if (d){
    const id = d.dataset.do, v = readForm(id);
    if (!Object.values(v).some(Boolean)) return toast(t('fillFirst'), true);
    d.disabled = true;
    try{
      if (id==='course')  await DB.insert('courses', {title:v.title, description:v.description||null});
      if (id==='lecture') await DB.insert('lectures', {course_id:route.id, title:v.title,
        order_index:Number(v.order_index)||1});
      if (id==='task')    await DB.insert('tasks', {lecture_id:route.id, title:v.title,
        due_date:v.due_date||null, max_score:v.max_score?Number(v.max_score):null});
      if (id==='group'){
        if (!v.course_id) { d.disabled=false; return toast(t('pickCourse'), true); }
        await DB.insert('groups', {title:v.title, course_id:v.course_id,
          start_date:v.start_date||null, status:'active'});
      }
      if (id==='student') await DB.insert('students', {name:v.name, phone:v.phone||null,
        parent_phone:v.parent_phone||null, is_active:true});
      if (id==='enr'){
        await DB.insert('enrollments', {group_id:route.id, student_id:v.student_id,
          joined_at:v.joined_at||today(), left_at:null});
        await loadAll(); toast(t('enrNote')); return render();
      }
      await loadAll(); toast(t('added')); render();
    }catch(err){ console.error(err); toast(t('err'), true); d.disabled=false; }
    return;
  }

  // مرفقات
  const pk = e.target.closest('[data-pick]');
  if (pk) return $('fu_'+pk.dataset.pick).click();

  const al = e.target.closest('[data-addlink]');
  if (al){
    const [type,pid] = al.dataset.addlink.split('|');
    const url = $('lu_'+pid).value.trim();
    if (!url) return toast(t('fillFirst'), true);
    await DB.insert('attachments', {parent_type:type, parent_id:pid, kind:'link',
      url, filename:$('ln_'+pid).value.trim() || url, size_bytes:null});
    await loadAll(); toast(t('added')); render();
    return;
  }

  const da = e.target.closest('[data-delatt]');
  if (da && confirm(t('delAtt'))){
    await DB.softDelete('attachments', da.dataset.delatt);
    await loadAll(); toast(t('deleted')); render();
    return;
  }

  // جروبات
  const lv = e.target.closest('[data-leave]');
  if (lv){
    const dd = prompt(t('askLeft'), today());
    if (!dd) return;
    await DB.update('enrollments', lv.dataset.leave, {left_at:dd});
    await loadAll(); toast(t('saved')); render();
    return;
  }
  const rj = e.target.closest('[data-rejoin]');
  if (rj){
    await DB.update('enrollments', rj.dataset.rejoin, {left_at:null});
    await loadAll(); toast(t('saved')); render();
    return;
  }
  const ar = e.target.closest('[data-arch]');
  if (ar){
    const gr = byId(M.groups, ar.dataset.arch);
    const next = gr.status==='active' ? 'archived' : 'active';
    if (next==='archived' && !confirm(t('confirmArch'))) return;
    await DB.update('groups', gr.id, {status:next});
    await loadAll(); toast(t('saved')); back();
    return;
  }

  // طلاب
  const ds = e.target.closest('[data-delstu]');
  if (ds && confirm(t('delStud'))){
    await DB.softDelete('students', ds.dataset.delstu);
    await loadAll(); toast(t('deleted')); render();
  }
});

document.addEventListener('change', async e=>{
  const up = e.target.closest('[data-upload]');
  if (!up || !up.files?.length) return;
  const [type,pid] = up.dataset.upload.split('|');

async function start(){
  $('gate').hidden = true;
  $('outBtn').hidden = false;

  let fails = [];
  try { fails = await loadAll(); }
  catch(e){ fails = ['load: ' + (e.message||e)]; }

  try { render(); }
  catch(e){
    console.error(e);
    $('title').textContent = 'خطأ في العرض';
    $('view').innerHTML = `<div class="msg" style="text-align:start;color:var(--bad);
      border-color:var(--bad);font-family:monospace;font-size:12.5px;direction:ltr">
      ${esc(e.message||e)}</div>`;
    return;
  }

  if (fails.length){
    $('view').insertAdjacentHTML('afterbegin', `
      <div class="msg" style="text-align:start;color:var(--bad);border-color:var(--bad);
        font-size:13px;line-height:1.8;margin-bottom:10px">
        <b>الداتابيز ناقصة حاجات — نفّذي schema.sql تاني في Supabase</b>
        <div style="font-family:monospace;font-size:11.5px;direction:ltr;margin-top:8px;
          opacity:.85">${fails.map(esc).join('<br>')}</div>
      </div>`);
  }
}

  if (!email || !pass) return gateMsg('Enter your email and password');
  if (mode==='up' && pass.length < 8)
    return gateMsg('Password must be at least 8 characters');

  const b = $('gBtn');
  b.disabled = true;
  b.textContent = mode==='in' ? 'Signing in…' : 'Creating…';
  gateMsg('');

  try{
    if (mode==='in'){
      const { error } = await sb.auth.signInWithPassword({email, password:pass});
      if (error) throw error;
      await start();
    } else {
      const { data, error } = await sb.auth.signUp({email, password:pass});
      if (error) throw error;
      if (data.session) await start();              // التأكيد بالإيميل مقفول → دخول فوري
      else {
        gateMsg('Account created. Check your email to confirm, then sign in.', true);
        setMode('in');
      }
    }
  }catch(err){
    console.error(err);
    const m = (err.message||'').toLowerCase();
    gateMsg(
      m.includes('already registered') ? 'This email already has an account — sign in instead.'
      : m.includes('invalid login')    ? 'Wrong email or password.'
      : m.includes('not confirmed')    ? 'Email not confirmed yet — check your inbox.'
      : err.message || 'Something went wrong.');
  }finally{
    b.disabled = false;
    b.textContent = mode==='in' ? 'Sign in' : 'Create account';
  }
});

$('gPass').addEventListener('keydown', e=>{ if (e.key==='Enter') $('gBtn').click(); });

$('outBtn').addEventListener('click', async ()=>{
  if (!confirm(t('signOut') + '؟')) return;
  await sb.auth.signOut();
  location.reload();
});

const { data: sess } = await sb.auth.getSession();
if (sess.session) await start();
else { setMode('in'); showGate(); }
</script>
</body>
</html>
